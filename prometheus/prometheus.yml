global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'jenkins-monitoring'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert.rules"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jenkins:8080']
    basic_auth:
      username: 'admin'
      password: 'admin123'  # Change this

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'jenkins-jobs'
    static_configs:
      - targets: ['jenkins:8080']
    metrics_path: '/job/metrics'
    params:
      job_name: ['.*']  # Collect all jobs
